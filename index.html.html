<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Custom App</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="logo.png">
  <meta name="theme-color" content="#ffffff">
</head>
<body>
  <h1>Tap below to enable notifications</h1>
  <button id="subscribe-btn">Enable Alerts</button>
  
  <p><small>Check console for your subscription keys.</small></p>

  <script>
    // REPLACE THIS with your actual Public VAPID Key later
    const publicVapidKey = 'BKPtfWkbL6wszsXN3HAzuq8yHy3Y_UT8lnoVwraDSaqVzlMSUAdRHk1x_G6qF6sqJq4UAzkl_ptPW6bdpMd-3GY';

    // Helper function required for VAPID encoding
    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
      const rawData = window.atob(base64);
      const outputArray = new Uint8Array(rawData.length);
      for (let i = 0; i < rawData.length; ++i) {
        outputArray[i] = rawData.charCodeAt(i);
      }
      return outputArray;
    }

    document.getElementById('subscribe-btn').addEventListener('click', async () => {
      if ('serviceWorker' in navigator && 'PushManager' in window) {
        try {
          // 1. Register Service Worker
          const register = await navigator.serviceWorker.register('/sw.js');
          console.log('Service Worker Registered');

          // 2. Request Notification Permission
          const permission = await Notification.requestPermission();
          if (permission !== 'granted') {
            alert('Permission denied.');
            return;
          }

          // 3. Subscribe to PushManager
          const subscription = await register.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlBase64ToUint8Array(publicVapidKey)
          });

          console.log('Push Subscription Object (Copy this!):');
          console.log(JSON.stringify(subscription));
          alert('Ready! Check your browser console for the subscription details.');

        } catch (error) {
          console.error('Subscription failed', error);
        }
      } else {
        alert('Push notifications are not supported on this browser.');
      }
    });
  </script>
</body>
</html>
