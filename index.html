<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Pro Setup</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 50px 20px; line-height: 1.6; }
        button { background: #007AFF; color: white; border: none; padding: 15px 25px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        textarea { width: 100%; height: 150px; margin-top: 20px; font-family: monospace; font-size: 12px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        #status { margin-top: 20px; color: #555; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h1>PWA Push Setup</h1>
    <p>Tap below to enable professional notifications.</p>
    
    <button id="subscribe-btn">Enable Alerts</button>
    
    <div id="status">Status: Waiting for action...</div>

    <!-- This section appears once you click the button -->
    <div id="output-section" class="hidden">
        <p><strong>Step 1: Copy this ID</strong></p>
        <textarea id="sub-json" readonly></textarea>
        <button id="copy-btn" style="background: #34C759; margin-top: 10px;">Copy to Clipboard</button>
        <p><small>Step 2: Paste this into your <b>send.js</b> file on your PC.</small></p>
    </div>

    <script>
        // 1. YOUR PUBLIC KEY GOES HERE
        const PUBLIC_VAPID_KEY = 'BKPtfWkbL6wszsXN3HAzuq8yHy3Y_UT8lnoVwraDSaqVzlMSUAdRHk1x_G6qF6sqJq4UAzkl_ptPW6bdpMd-3GY';

        const subBtn = document.getElementById('subscribe-btn');
        const statusDiv = document.getElementById('status');
        const outputSection = document.getElementById('output-section');
        const subTextArea = document.getElementById('sub-json');

        // Helper to convert the key for the browser
        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        }

        subBtn.addEventListener('click', async () => {
            statusDiv.innerText = "Processing...";

            // Check if PWA features are available
            if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
                statusDiv.innerText = "Error: This browser/device doesn't support Push.";
                return;
            }

            try {
                // Register Service Worker
                const registration = await navigator.serviceWorker.register('sw.js');
                
                // Request Permission
                const permission = await Notification.requestPermission();
                if (permission !== 'granted') {
                    statusDiv.innerText = "Permission Denied. Reset settings and try again.";
                    return;
                }

                // Subscribe
                const subscription = await registration.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array(PUBLIC_VAPID_KEY)
                });

                // Success! Show the data
                statusDiv.innerText = "✅ Success! ID Generated.";
                subTextArea.value = JSON.stringify(subscription);
                outputSection.classList.remove('hidden');
                
            } catch (err) {
                console.error(err);
                statusDiv.innerText = "Error: " + err.message;
            }
        });

        // Copy button logic
        document.getElementById('copy-btn').addEventListener('click', () => {
            subTextArea.select();
            document.execCommand('copy');
            alert("Copied! Now send this text to your PC.");
        });
    </script>
</body>
</html>
